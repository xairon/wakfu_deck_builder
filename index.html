<!doctype html>
<html lang="fr" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/images/pwa-192x192.png" />
    <link rel="apple-touch-icon" href="/images/pwa-192x192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="L'Almanach des Douze — gérez votre collection de cartes Wakfu TCG, construisez et validez vos decks, parcourez les decks officiels."
    />
    <meta name="theme-color" content="#F6F5F1" />
    <title>L'Almanach des Douze · Wakfu TCG</title>

    <!-- Fraunces (titres) · Hanken Grotesk (corps/UI moderne) · Space Mono (nombres) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,360..560;1,9..144,360..500&family=Hanken+Grotesk:wght@300..800&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <script>
      (function () {
        const savedTheme = localStorage.getItem("wakfu-theme") || "light";
        document.documentElement.setAttribute("data-theme", savedTheme);
      })();
    </script>
    <style>
      html {
        background-color: #f6f5f1; /* clair moderne */
      }
      html[data-theme="dark"] {
        background-color: #131316; /* nuit moderne */
      }
      body {
        min-height: 100vh;
        margin: 0;
      }
      #app {
        min-height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
